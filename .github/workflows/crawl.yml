name: Crawl

# Re-check the trusted-institution watchlist daily and commit the fresh
# leaderboard. DoH (Cloudflare/Google) is keyless, CORS-open, and never
# rate-blocks — so this is rock-solid from CI.
on:
  schedule:
    - cron: "33 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run build:data
      - run: npm run build:web
      - name: Commit refreshed leaderboard
        run: |
          git config user.name "can-i-be-phished-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data docs
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "data: refresh spoofability leaderboard [skip ci]"
            git push
          fi
